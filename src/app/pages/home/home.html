<!-- DETAILS BOX -->
<div *ngIf="selectedPlace" class="details">

  <h2>{{selectedPlace.title}}</h2>

  <p><b>Popular Areas:</b></p>
  <p>{{selectedPlace.popular}}</p>

  <p><b>History:</b></p>
  <p>{{selectedPlace.history}}</p>

  <p><b>Expenses:</b></p>
  <p>{{selectedPlace.expenses}}</p>

  <p><b>Main Places:</b></p>
  <p>{{selectedPlace.places}}</p>

</div>
