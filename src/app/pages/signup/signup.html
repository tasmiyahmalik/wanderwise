<div class="signup-container">
  <div class="signup-card">
    <h2>Join WanderWise</h2>
    <p>Create your account to start exploring</p>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" placeholder="Enter your name" />
        <span class="error" *ngIf="signupForm.get('name')?.invalid && signupForm.get('name')?.touched">
          Name is required
        </span>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email" />
        <span class="error" *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched">
          Valid email is required
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min 6 characters" />
        <span class="error" *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched">
          Password must be at least 6 characters
        </span>
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" [disabled]="signupForm.invalid">Create Account</button>
    </form>

    <p class="login-link">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
